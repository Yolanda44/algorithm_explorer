<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Algorithm Explorer</h1>
      <p>Enter numbers, pick an algorithm, and watch every step.</p>
    </header>

    <section class="panel">
      <label for="numbers">Numbers (comma or space separated)</label>
      <textarea id="numbers" rows="3" placeholder="5, 2, 9, 1, 3"></textarea>

      <div class="row">
        <div class="field">
          <label for="algorithm">Algorithm</label>
          <select id="algorithm">
            <optgroup label="Sorting">
              <option value="bubble">Bubble Sort</option>
              <option value="insertion">Insertion Sort</option>
              <option value="merge">Merge Sort</option>
              <option value="quick">Quick Sort</option>
            </optgroup>
            <optgroup label="Searching">
              <option value="linear">Linear Search</option>
              <option value="binary">Binary Search</option>
              <option value="recursive-binary">Recursive Binary Search</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label for="target">Target (for searching)</label>
          <input id="target" type="number" placeholder="e.g. 4" />
        </div>
        <div class="field">
          <label for="speed">Animation speed: <span id="speed-value">700ms</span></label>
          <input id="speed" type="range" min="200" max="1500" step="100" value="700" />
        </div>
      </div>

      <div id="algorithm-guide" class="guide">
        <strong>Algorithm Guide</strong>
        <div class="guide-body">Select an algorithm to see how it works.</div>
      </div>

      <button id="run">Run Algorithm</button>
      <div id="status" class="status">Idle</div>
    </section>

    <section class="visualization">
      <h2>Visualization</h2>
      <div id="bars" class="bars"></div>
      <div id="search-array" class="search-array"></div>
      <div class="step-panel">
        <div id="step-counter">Step 0 / 0</div>
        <div id="step-detail">Waiting to run an algorithm.</div>
      </div>
    </section>

    <section class="panel">
      <h3>Result</h3>
      <pre id="output">Waiting for input...</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
